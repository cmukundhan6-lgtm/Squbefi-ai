kind = "web"
previewPath = "/squebefi-ai/"
title = "Squebefi AI"
version = "1.0.0"
id = "artifacts/squebefi-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/squebefi-ai/" ]
localPort = 26120

[services.development]
run = "pnpm --filter @workspace/squebefi-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/squebefi-ai", "run", "build" ]
publicDir = "artifacts/squebefi-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26120"
BASE_PATH = "/squebefi-ai/"
